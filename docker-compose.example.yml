services:
  river-seg:
    build:
      context: .
      dockerfile: Dockerfile
    image: river-seg-sam3:latest
    gpus: all
    shm_size: "16gb"
    environment:
      ARCHIVE_ROOT: /mount/lcamai/latest-all
      OUTPUT_ROOT: /mount/lcamai/result-all
      RUNTIME_ROOT: /mount/lcamai/river-seg-runtime
      THRESHOLD_JSON: /workspace/river_seg_server_deploy/config/thresholds.example.json
      BASE_CHECKPOINT: /checkpoints/sam3.pt
      CHECKPOINT: /checkpoints/checkpoint_best.pt
      GPU_IDS: "0"
      FRAME_COUNT: "10"
      SAVE_MASK: "1"
      SAVE_OVERLAY: "1"
      LOOP: "1"
      INTERVAL_SECONDS: "300"
    volumes:
      - /mount/lcamai:/mount/lcamai
      - /path/to/checkpoints:/checkpoints:ro
